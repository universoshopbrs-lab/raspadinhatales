<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Raspadinha Tales Lanches</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

h1{
color:yellow;
}

.grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
justify-content:center;
margin-top:40px;
}

.card{
background:#222;
border:3px solid yellow;
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎰 Raspadinha Tales Lanches</h1>

<div id="game" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMbD1Al2iME8WO9RwwAsxmVJg5TGsWfT4",
  authDomain: "tales-32c5a.firebaseapp.com",
  projectId: "tales-32c5a",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(!code){
alert("Código inválido");
}

const ref = doc(db,"raspadinhas",code);
const snap = await getDoc(ref);

if(!snap.exists()){
alert("Código não existe");
}

if(snap.data().usado){
alert("Essa raspadinha já foi usada!");
}

const premios = [
"🍔 X Burguer Gratis",
"🥤 Coca Lata",
"🎁 Cheddar Gratis",
"🎁 Catupiry Gratis",
"🚚 Entrega Gratis",
"💸 5 Reais Desconto",
"❌ Não foi dessa vez"
];

function gerarGrid(){

let resultado=[];

for(let i=0;i<9;i++){

let premio=premios[Math.floor(Math.random()*premios.length)];
resultado.push(premio);

let card=document.createElement("div");
card.className="card";
card.innerHTML="?";

card.onclick=async ()=>{

card.innerHTML=premio;

// salvar no firebase que foi usado
await updateDoc(ref,{
usado:true,
premio:premio,
data:new Date().toLocaleString()
});

};

document.getElementById("game").appendChild(card);

}

}

gerarGrid();

</script>

</body>
</html>
