<!DOCTYPE html>
<html>
<head>

<title>Raspadinha Tales Lanches</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin-top:100px;
}

h1{
color:yellow;
}

button{

background:yellow;
border:none;
padding:20px;
font-size:20px;
cursor:pointer;
border-radius:10px;

}

#resultado{

margin-top:40px;
font-size:30px;

}

</style>

</head>

<body>

<h1>🎰 Raspadinha Tales Lanches</h1>

<button onclick="raspar()">RASPAR</button>

<div id="resultado"></div>

<script>

function raspar(){

let premios = [

"🍔 X Burguer grátis",
"🧀 Cheddar grátis",
"🧀 Catupiry grátis",
"🚚 Entrega grátis",
"🥤 Coca lata",
"💰 R$5 de desconto",
"❌ Não foi dessa vez"

];

let premio = premios[Math.floor(Math.random()*premios.length)];

document.getElementById("resultado").innerHTML = premio;

}

</script>

</body>
</html>
