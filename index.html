<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 Raspadinha Tales Lanches</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

/* HEADER */

header{
padding:20px;
background:#111;
border-bottom:3px solid #FFD700;
}

header h1{
margin:0;
color:#FFD700;
text-shadow:0 0 10px #FFD700;
}

/* SLOT MACHINE */

.slot-container{

margin-top:50px;
perspective:800px;

}

.slots{

display:flex;
justify-content:center;
gap:15px;

}

.slot{

width:80px;
height:80px;

background:#000;
border:3px solid #FFD700;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;

box-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700 inset;

transform-style:preserve-3d;

}

/* BOTÃO */

button{

margin-top:40px;

background:#FFD700;
color:#000;

border:none;

padding:15px 30px;

font-size:18px;

border-radius:10px;

cursor:pointer;

font-weight:bold;

animation:glow 1.5s infinite alternate;

}

@keyframes glow{

from{
box-shadow:0 0 10px #FFD700;
}

to{
box-shadow:0 0 25px #FFD700;
}

}

/* RESULTADO */

#resultado{

margin-top:30px;
font-size:22px;

}

/* CONFETE */

.confete{

position:fixed;

width:10px;
height:10px;

top:-10px;

animation:cair 3s linear forwards;

}

@keyframes cair{

to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}

}

</style>

</head>

<body>

<header>

<h1>🎰 Tales Lanches</h1>

</header>

<div class="slot-container">

<div class="slots">

<div class="slot" id="s1">❓</div>
<div class="slot" id="s2">❓</div>
<div class="slot" id="s3">❓</div>

</div>

<button onclick="girar()">🎰 Girar Slot</button>

<div id="resultado"></div>

</div>

<audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2001/2001-preview.mp3"></audio>

<script>

if(localStorage.getItem("slotUsado")){

document.body.innerHTML="<h2 style='padding:40px'>⚠️ Você já jogou hoje</h2>";

}

const simbolos=["🍔","🥤","🧀","❌"];

function girar(){

let spins=0;

let intervalo=setInterval(()=>{

document.getElementById("s1").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];
document.getElementById("s2").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];
document.getElementById("s3").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];

spins++;

if(spins>20){

clearInterval(intervalo);

resultado();

}

},100);

}

function resultado(){

let a=document.getElementById("s1").innerText;
let b=document.getElementById("s2").innerText;
let c=document.getElementById("s3").innerText;

localStorage.setItem("slotUsado","1");

if(a===b && b===c && a!=="❌"){

document.getElementById("resultado").innerHTML="🏆 JACKPOT! Você ganhou!";

document.getElementById("som").play();

confete();

}else{

document.getElementById("resultado").innerHTML="❌ Não foi dessa vez";

}

}

function confete(){

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confete";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

</script>

</body>
</html>
