<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 Raspadinha Tales Lanches</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

header{
padding:20px;
border-bottom:3px solid #FFD700;
}

header h1{
color:#FFD700;
margin:0;
text-shadow:0 0 10px #FFD700;
}

.slot-container{
margin-top:60px;
perspective:800px;
}

.slots{
display:flex;
justify-content:center;
gap:20px;
}

.slot{

width:90px;
height:90px;

background:#000;
border:3px solid #FFD700;

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-size:45px;

box-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700 inset;

}

button{

margin-top:40px;

background:#FFD700;
color:#000;

border:none;

padding:16px 30px;

font-size:18px;

border-radius:12px;

cursor:pointer;

font-weight:bold;

animation:glow 1.5s infinite alternate;

}

@keyframes glow{

from{box-shadow:0 0 10px #FFD700}
to{box-shadow:0 0 25px #FFD700}

}

#resultado{
margin-top:30px;
font-size:22px;
padding:10px;
}

.codigo{

margin-top:15px;

background:#111;
border:2px dashed #FFD700;

padding:12px;

letter-spacing:3px;

}

.confete{

position:fixed;
width:10px;
height:10px;
top:-10px;
animation:cair 3s linear forwards;

}

@keyframes cair{

to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}

}

</style>

</head>

<body>

<header>
<h1>🎰 Tales Lanches</h1>
</header>

<div class="slot-container">

<div class="slots">

<div class="slot" id="s1">❓</div>
<div class="slot" id="s2">❓</div>
<div class="slot" id="s3">❓</div>

</div>

<button onclick="girar()">🎰 Girar Slot</button>

<div id="resultado"></div>
<div id="codigo" class="codigo"></div>

</div>

<audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2001/2001-preview.mp3"></audio>

<script>

/* BLOQUEAR JOGAR DE NOVO */

if(localStorage.getItem("slotUsado")){
document.body.innerHTML="<h2 style='padding:40px'>⚠️ Você já usou sua raspadinha</h2>";
}

/* SIMBOLOS */

const simbolos=["🧀","🧀","🛵","💰","🥤","🥤","🎟","🍔","❌"];

/* PREMIOS */

const premios={

"🧀":"Queijo grátis (Catupiry ou Cheddar)",
"🛵":"Entrega grátis",
"💰":"R$5 de desconto",
"🥤":"Coca (lata ou 1L)",
"🎟":"5% de desconto no próximo pedido",
"🍔":"X Burguer grátis"

};

function girar(){

let spins=0;

let intervalo=setInterval(()=>{

document.getElementById("s1").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];
document.getElementById("s2").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];
document.getElementById("s3").innerText=simbolos[Math.floor(Math.random()*simbolos.length)];

spins++;

if(spins>25){

clearInterval(intervalo);

resultado();

}

},100);

}

function resultado(){

let a=document.getElementById("s1").innerText;
let b=document.getElementById("s2").innerText;
let c=document.getElementById("s3").innerText;

localStorage.setItem("slotUsado","1");

if(a===b && b===c && a!=="❌"){

let premio=premios[a];

document.getElementById("resultado").innerHTML="🏆 PARABÉNS! Você ganhou:<br><b>"+premio+"</b>";

let codigo="TL"+Math.floor(Math.random()*100000);

document.getElementById("codigo").innerText="Código: "+codigo;

document.getElementById("som").play();

confete();

}else{

document.getElementById("resultado").innerHTML="❌ Não foi dessa vez";

}

}

function confete(){

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confete";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

</script>

</body>
</html>
