<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raspadinha Tales Lanches</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#FFD700;
font-size:32px;
text-shadow:0 0 15px #FFD700;
}

.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
max-width:350px;
margin:auto;

}

canvas{
width:100%;
height:100px;
border-radius:10px;
}

#resultado{
font-size:26px;
margin-top:20px;
}

.confete{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:cair 3s linear forwards;
}

@keyframes cair{

to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}

}

</style>
</head>

<body>

<h1>🎰 Raspadinha Tales Lanches</h1>

<div class="grid" id="grid"></div>

<div id="resultado"></div>

<audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>

const simbolos = [
"🍔","🍔","🍔",
"🥤","🥤","🥤",
"🧀","🧀",
"❌"
];

let resultados=[];
let raspados=0;

function embaralhar(){

return [...simbolos].sort(()=>Math.random()-0.5);

}

function criarCartela(){

let lista=embaralhar();

const grid=document.getElementById("grid");

for(let i=0;i<9;i++){

let canvas=document.createElement("canvas");

canvas.width=100;
canvas.height=100;

grid.appendChild(canvas);

let ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font="40px Arial";
ctx.fillStyle="#000";
ctx.fillText("?",40,60);

let simbolo=lista[i];
resultados.push(simbolo);

let raspando=false;

function raspar(x,y){

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();
ctx.arc(x,y,15,0,Math.PI*2);
ctx.fill();

}

canvas.addEventListener("mousedown",()=>raspando=true);
canvas.addEventListener("mouseup",()=>raspando=false);

canvas.addEventListener("mousemove",(e)=>{

if(!raspando) return;

let rect=canvas.getBoundingClientRect();

raspar(e.clientX-rect.left,e.clientY-rect.top);

});

canvas.addEventListener("touchmove",(e)=>{

let rect=canvas.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;

raspar(x,y);

});

setTimeout(()=>{

ctx.globalCompositeOperation="destination-over";

ctx.font="40px Arial";
ctx.fillStyle="#fff";
ctx.fillText(simbolo,35,60);

},100);

canvas.addEventListener("mouseup",()=>{

raspados++;

if(raspados===9){

verificar();

}

});

}

}

function verificar(){

let contagem={};

resultados.forEach(s=>{

contagem[s]=(contagem[s]||0)+1;

});

let premio="❌ Não foi dessa vez";

if(contagem["🍔"]>=3) premio="🍔 X Burguer grátis";
if(contagem["🥤"]>=3) premio="🥤 Coca lata";
if(contagem["🧀"]>=3) premio="🧀 Cheddar grátis";

document.getElementById("resultado").innerHTML="Resultado: "+premio;

if(premio!=="❌ Não foi dessa vez"){

confete();
document.getElementById("som").play();

}

}

function confete(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confete";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

criarCartela();

</script>

</body>
</html>
