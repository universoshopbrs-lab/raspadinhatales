<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raspadinha Tales Lanches</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#000;
color:white;
text-align:center;
}

/* HEADER */

header{
padding:20px;
background:#111;
border-bottom:3px solid #FFD700;
}

header h1{
color:#FFD700;
margin:0;
}

/* GRID */

.container{
padding:20px;
max-width:420px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* CARTÕES */

.card{

position:relative;
aspect-ratio:1/1;
border-radius:12px;
overflow:hidden;
background:#111;

border:2px solid #FFD700;

box-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700;

animation:brilho 2s infinite alternate;

}

@keyframes brilho{

from{box-shadow:0 0 5px #FFD700}
to{box-shadow:0 0 20px #FFD700}

}

.card span{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;

}

/* CANVAS RASPAGEM */

canvas{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

}

/* TELA FINAL */

#resultado{

display:none;
padding:30px;

}

#resultado img{

width:160px;
margin:20px 0;

}

.codigo{

background:#111;
border:2px dashed #FFD700;
padding:15px;
margin:20px;
font-size:20px;
letter-spacing:3px;

}

button{

background:#FFD700;
border:none;
padding:14px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<h1>🎰 Raspadinha Tales Lanches</h1>

</header>

<div class="container">

<div id="jogo">

<div class="grid" id="grid"></div>

</div>

<div id="resultado">

<h2 id="titulo"></h2>

<img id="imgPremio">

<div class="codigo" id="codigo"></div>

<button onclick="compartilhar()">Compartilhar no WhatsApp</button>

</div>

</div>

<audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>

/* BLOQUEIO */

if(localStorage.getItem("raspadinha")){
document.body.innerHTML="<h2 style='padding:40px'>⚠️ Você já usou sua raspadinha</h2>";
}

/* PREMIOS */

const premios={

"🍔":{nome:"X Burguer Grátis",img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
"🥤":{nome:"Coca Lata",img:"https://cdn-icons-png.flaticon.com/512/3050/3050155.png"},
"🧀":{nome:"Cheddar Grátis",img:"https://cdn-icons-png.flaticon.com/512/685/685352.png"}

};

/* SIMBOLOS */

const simbolos=[

"🍔","🍔","🍔",
"🥤","🥤","🥤",
"🧀","🧀",
"❌"

];

let lista=[...simbolos].sort(()=>Math.random()-0.5);

let resultados=[];
let raspados=0;

const grid=document.getElementById("grid");

/* GERAR CARTELA */

for(let i=0;i<9;i++){

let card=document.createElement("div");
card.className="card";

let span=document.createElement("span");
span.innerText=lista[i];

card.appendChild(span);

let canvas=document.createElement("canvas");
card.appendChild(canvas);

grid.appendChild(card);

resultados.push(lista[i]);

let ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=300;

/* TEXTURA RASPAGEM */

let grad=ctx.createLinearGradient(0,0,300,300);

grad.addColorStop(0,"#bbb");
grad.addColorStop(1,"#666");

ctx.fillStyle=grad;

ctx.fillRect(0,0,300,300);

ctx.fillStyle="#222";
ctx.font="bold 30px Arial";
ctx.fillText("RASPE",90,160);

/* RASPAGEM */

let raspando=false;

function raspar(x,y){

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.fill();

}

canvas.addEventListener("mousedown",()=>raspando=true);

canvas.addEventListener("mouseup",()=>{

raspando=false;
raspados++;
check();

});

canvas.addEventListener("mousemove",(e)=>{

if(!raspando) return;

let r=canvas.getBoundingClientRect();

raspar((e.clientX-r.left)*canvas.width/r.width,(e.clientY-r.top)*canvas.height/r.height);

});

canvas.addEventListener("touchmove",(e)=>{

let r=canvas.getBoundingClientRect();

let x=(e.touches[0].clientX-r.left)*canvas.width/r.width;
let y=(e.touches[0].clientY-r.top)*canvas.height/r.height;

raspar(x,y);

});

}

/* RESULTADO */

function check(){

if(raspados<9) return;

let contagem={};

resultados.forEach(s=>{

contagem[s]=(contagem[s]||0)+1;

});

let simbolo=null;

if(contagem["🍔"]>=3) simbolo="🍔";
if(contagem["🥤"]>=3) simbolo="🥤";
if(contagem["🧀"]>=3) simbolo="🧀";

document.getElementById("jogo").style.display="none";
document.getElementById("resultado").style.display="block";

localStorage.setItem("raspadinha","1");

/* GERAR CODIGO */

let codigo="TL"+Math.floor(Math.random()*100000);

document.getElementById("codigo").innerText="Código: "+codigo;

if(simbolo){

let premio=premios[simbolo];

document.getElementById("titulo").innerHTML="🎉 PARABÉNS!";

document.getElementById("imgPremio").src=premio.img;

document.getElementById("som").play();

confete();

}else{

document.getElementById("titulo").innerHTML="❌ Não foi dessa vez";

}

}

/* CONFETE */

function confete(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.width="10px";
c.style.height="10px";

c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

c.style.left=Math.random()*100+"vw";
c.style.top="-10px";

c.style.animation="fall 3s linear forwards";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}

/* WHATSAPP */

function compartilhar(){

let texto="Acabei de jogar a raspadinha da Tales Lanches! 🍔🎰";

window.open("https://wa.me/?text="+encodeURIComponent(texto));

}

</script>

<style>

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>

</body>
</html>
