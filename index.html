<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raspadinha Tales Lanches</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#FFD700;
text-shadow:0 0 10px #FFD700;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:350px;
margin:auto;
}

canvas{
width:100%;
height:100px;
border-radius:10px;
}

#telaPremio{
display:none;
margin-top:30px;
}

#telaPremio img{
width:150px;
}

button{
padding:12px 20px;
border:none;
background:#FFD700;
border-radius:8px;
margin-top:15px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎰 Raspadinha Tales Lanches</h1>

<div id="jogo">

<div class="grid" id="grid"></div>

</div>

<div id="telaPremio">

<h2 id="textoPremio"></h2>

<img id="imgPremio">

<br>

<button onclick="compartilhar()">Compartilhar no WhatsApp</button>

</div>

<audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>

if(localStorage.getItem("raspadinhaUsada")){

document.body.innerHTML="<h1>⚠️ Você já usou sua raspadinha</h1>";

}

const premios = {

"🍔":{

nome:"X Burguer Grátis",
img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"

},

"🥤":{

nome:"Coca Lata",
img:"https://cdn-icons-png.flaticon.com/512/3050/3050155.png"

},

"🧀":{

nome:"Cheddar Grátis",
img:"https://cdn-icons-png.flaticon.com/512/685/685352.png"

}

};

const simbolos=[

"🍔","🍔","🍔",
"🥤","🥤","🥤",
"🧀","🧀",
"❌"

];

let resultados=[];
let raspados=0;

function embaralhar(){

return [...simbolos].sort(()=>Math.random()-0.5);

}

function criarCartela(){

let lista=embaralhar();

const grid=document.getElementById("grid");

for(let i=0;i<9;i++){

let canvas=document.createElement("canvas");

canvas.width=100;
canvas.height=100;

grid.appendChild(canvas);

let ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font="40px Arial";
ctx.fillStyle="#000";
ctx.fillText("RASPE",10,60);

let simbolo=lista[i];
resultados.push(simbolo);

ctx.globalCompositeOperation="destination-over";
ctx.font="40px Arial";
ctx.fillStyle="#fff";
ctx.fillText(simbolo,35,60);

ctx.globalCompositeOperation="source-over";

let raspando=false;

function raspar(x,y){

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();
ctx.arc(x,y,15,0,Math.PI*2);
ctx.fill();

}

canvas.addEventListener("mousedown",()=>raspando=true);
canvas.addEventListener("mouseup",()=>{

raspando=false;

raspados++;

if(raspados===9){

verificar();

}

});

canvas.addEventListener("mousemove",(e)=>{

if(!raspando) return;

let rect=canvas.getBoundingClientRect();

raspar(e.clientX-rect.left,e.clientY-rect.top);

});

canvas.addEventListener("touchmove",(e)=>{

let rect=canvas.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;

raspar(x,y);

});

}

}

function verificar(){

let contagem={};

resultados.forEach(s=>{

contagem[s]=(contagem[s]||0)+1;

});

let simboloGanhador=null;

if(contagem["🍔"]>=3) simboloGanhador="🍔";
if(contagem["🥤"]>=3) simboloGanhador="🥤";
if(contagem["🧀"]>=3) simboloGanhador="🧀";

document.getElementById("jogo").style.display="none";

localStorage.setItem("raspadinhaUsada","true");

if(simboloGanhador){

let premio=premios[simboloGanhador];

document.getElementById("telaPremio").style.display="block";
document.getElementById("textoPremio").innerHTML="🎉 Você ganhou "+premio.nome;

document.getElementById("imgPremio").src=premio.img;

document.getElementById("som").play();

confete();

}else{

document.getElementById("telaPremio").style.display="block";
document.getElementById("textoPremio").innerHTML="❌ Não foi dessa vez";

}

}

function compartilhar(){

let texto="Ganhei um prêmio na raspadinha da Tales Lanches! 🍔";

let url="https://wa.me/?text="+encodeURIComponent(texto);

window.open(url);

}

function confete(){

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.width="8px";
c.style.height="8px";
c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";

c.style.animation="cair 3s linear forwards";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}

criarCartela();

</script>

<style>

@keyframes cair{

to{

transform:translateY(100vh) rotate(720deg);
opacity:0;

}

}

</style>

</body>
</html>
